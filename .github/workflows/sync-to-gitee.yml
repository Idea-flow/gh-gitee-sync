name: Sync all repos to Gitee

on:
  schedule:
    - cron: '0 0 * * *'       # 每天凌晨 0 点自动同步
  workflow_dispatch:          # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror GitHub repos to Gitee
        uses: Yikun/hub-mirror-action@master
        with:
          src: github/${{ vars.GH_USERNAME }}
          dst: gitee/${{ vars.GITEE_USERNAME }}
          dst_key: ${{ secrets.GITEE_PRIVATE_KEY }}
          dst_token: ${{ secrets.GITEE_TOKEN }}
          account_type: user
          clone_style: "ssh"
          static_list: 'gh-gitee-sync,YunyuStudio,JavaInterviewObsidian,zimeiti,ideaflow-web-tool,AiPromptHub,YunyuCanvas,m3u8download,Yunyu,asmr-serverless,Ideaflow-web-blog,SelfToolsStudio,MacRightClick,wallpaper,Ideaflow-web,ideaflow-admin'
          # 如需排除特定仓库，取消注释：
          # black_list: 'repo-archive,repo-deprecated'
          # 如需强制覆盖 Gitee（全量同步），取消注释：
          # force_update: true
